<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrinkHub - Chi tiết quán</title>
    <link rel="stylesheet" href="../../component/header/header.css">
    <link rel="stylesheet" href="../../component/footer/footer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./detailPage.css">
    <style>
        .toast-notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 1000;
            animation: fadeInOut 2.5s ease;
        }

        @keyframes fadeInOut {
            0% {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }

            15% {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }

            85% {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }

            100% {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
        }

        .fav-btn.active {
            background: #ff6b6b;
            color: white;
            border-color: #ff6b6b;
        }

        .fav-btn.active i {
            color: white;
        }
    </style>
</head>

<body>
    <div id="header-placeholder"></div>

    <main>
        <a href="javascript:history.back()" class="back-btn">
            <i class="fas fa-arrow-left"></i> Quay lại
        </a>

        <div class="cafe-detail" id="cafeDetail">
            <!-- Nội dung sẽ được hiển thị từ JavaScript -->
            <div style="text-align: center; padding: 50px;">Đang tải thông tin...</div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../../js/main.js"></script>
    <script>
        // Lấy dữ liệu quán từ localStorage
        let cafeData = null;

        try {
            const storedData = localStorage.getItem("selectedCafe");
            if (storedData) {
                cafeData = JSON.parse(storedData);
            }
        } catch (e) {
            console.error("Lỗi đọc dữ liệu:", e);
        }

        // Hàm xử lý đường dẫn ảnh
        function getImagePath(imgPath) {
            if (!imgPath) return 'https://via.placeholder.com/1200x300?text=DrinkHub';

            // Nếu đường dẫn đã là URL đầy đủ hoặc absolute path
            if (imgPath.startsWith('http') || imgPath.startsWith('//')) {
                return imgPath;
            }

            // Xử lý đường dẫn ảnh từ listPage
            // listPage nằm ở: pages/cafe/listPage.html
            // detailPage nằm ở: pages/cafe/detailPage/detailPage.html
            // Ảnh nằm ở: pages/cafe/img/

            // Nếu đường dẫn bắt đầu với ./img/ (từ listPage)
            if (imgPath.startsWith('./img/')) {
                // Đường dẫn từ detailPage đến thư mục img: ../img/
                return imgPath.replace('./img/', '../img/');
            }

            // Nếu đường dẫn bắt đầu với img/ (không có dấu .)
            if (imgPath.startsWith('img/')) {
                return '../' + imgPath;
            }

            return imgPath;
        }

        // Nếu không có dữ liệu, tạo dữ liệu mẫu với đường dẫn ảnh đúng
        if (!cafeData) {
            cafeData = {
                id: 1,
                ten: "Oromia Coffee",
                quan: "Quận 3",
                rating: "4.7",
                review: "120",
                img: "../img/img1.jpg",  // Đã sửa đường dẫn
                address: "123 Nguyễn Thị Minh Khai, Quận 3",
                openTime: "07:00 - 22:00",
                phone: "0901 234 567",
                description: "Oromia Coffee là quán cà phê phong cách hiện đại, không gian thoáng mát, thích hợp làm việc và thư giãn.",
                menu: [
                    { name: "Cà phê sữa đá", price: "39.000đ" },
                    { name: "Bạc xỉu", price: "42.000đ" },
                    { name: "Americano", price: "45.000đ" }
                ],
                utilities: ["Wifi miễn phí", "Máy lạnh", "Ổ cắm điện", "Nhạc nhẹ"]
            };
        } else {
            // Xử lý đường dẫn ảnh của dữ liệu từ localStorage
            cafeData.img = getImagePath(cafeData.img);
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast-notification';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function renderDetail() {
            const container = document.getElementById('cafeDetail');

            // Tạo menu HTML
            let menuHtml = '';
            if (cafeData.menu && cafeData.menu.length > 0) {
                menuHtml = `<div class="menu-category">☕ Thực đơn</div>`;
                cafeData.menu.forEach(item => {
                    menuHtml += `
                        <div class="menu-item">
                            <span>${item.name}</span>
                            <span style="color: #c7a17a; font-weight: 500;">${item.price}</span>
                        </div>
                    `;
                });
            } else {
                menuHtml = `<div class="menu-category">☕ Thực đơn</div>
                            <div class="menu-item"><span>Cà phê sữa đá</span><span>39.000đ</span></div>
                            <div class="menu-item"><span>Bạc xỉu</span><span>42.000đ</span></div>
                            <div class="menu-item"><span>Americano</span><span>45.000đ</span></div>`;
            }

            // Tạo tiện ích HTML
            let utilitiesHtml = '';
            if (cafeData.utilities && cafeData.utilities.length > 0) {
                utilitiesHtml = cafeData.utilities.map(u => `<span class="amenity-item">${u}</span>`).join('');
            } else {
                utilitiesHtml = `<span class="amenity-item">Wifi miễn phí</span>
                                 <span class="amenity-item">Máy lạnh</span>
                                 <span class="amenity-item">Ổ cắm điện</span>`;
            }

            container.innerHTML = `
                <div class="cafe-header">
                    <img src="${cafeData.img}" alt="${cafeData.ten}" class="cafe-banner" 
                         onerror="this.src='https://via.placeholder.com/1200x300?text=DrinkHub'">
                </div>

                <div class="cafe-title">
                    <h1 class="cafe-name">${cafeData.ten}</h1>
                    <div class="cafe-rating">
                        <div class="stars">${'★'.repeat(Math.floor(parseFloat(cafeData.rating)))}${'☆'.repeat(5 - Math.floor(parseFloat(cafeData.rating)))}</div>
                        <span class="rating-score">${cafeData.rating}</span>
                        <span class="review-count">(${cafeData.review} đánh giá)</span>
                    </div>
                    <div class="tags">
                        <span class="tag">📍 ${cafeData.quan}</span>
                        <span class="tag">☕ Cà phê</span>
                        <span class="tag">📸 Check-in</span>
                    </div>
                </div>

                <div class="cafe-info">
                    <div class="info-item">
                        <div class="info-icon"><i class="fas fa-map-marker-alt"></i></div>
                        <div class="info-content">
                            <div class="info-label">Địa chỉ</div>
                            <div class="info-text">${cafeData.address || 'Đang cập nhật'}</div>
                            <a href="https://maps.google.com/?q=${encodeURIComponent(cafeData.address || '')}" target="_blank" class="direction-btn">
                                <i class="fas fa-directions"></i> Chỉ đường
                            </a>
                        </div>
                    </div>

                    <div class="info-item">
                        <div class="info-icon"><i class="fas fa-clock"></i></div>
                        <div class="info-content">
                            <div class="info-label">Giờ mở cửa</div>
                            <div class="info-text">${cafeData.openTime || '07:00 - 22:00'}</div>
                        </div>
                    </div>

                    <div class="info-item">
                        <div class="info-icon"><i class="fas fa-phone-alt"></i></div>
                        <div class="info-content">
                            <div class="info-label">Điện thoại</div>
                            <div class="info-text">${cafeData.phone || 'Đang cập nhật'}</div>
                        </div>
                    </div>
                </div>

                <div class="tabs">
                    <div class="tab active" data-tab="desc">Mô tả</div>
                    <div class="tab" data-tab="menu">Thực đơn</div>
                    <div class="tab" data-tab="utilities">Tiện ích</div>
                </div>

                <div id="descContent" class="tab-content active">
                    <div class="desc-text">
                        <p>${cafeData.description || 'Đang cập nhật thông tin mô tả...'}</p>
                    </div>
                </div>

                <div id="menuContent" class="tab-content">
                    ${menuHtml}
                    <div style="margin-top: 20px; font-size: 12px; color: #999;">
                        * Menu có thể thay đổi theo mùa, giá chưa bao gồm VAT
                    </div>
                </div>

                <div id="utilitiesContent" class="tab-content">
                    <div class="amenities-list">
                        ${utilitiesHtml}
                    </div>
                </div>

                <div class="action-buttons" style="margin-top: 30px; display: flex; gap: 15px;">
                    <button class="fav-btn" id="favBtn" style="padding: 10px 20px; border-radius: 8px; border: 1px solid #ddd; background: white; cursor: pointer;">
                        <i class="far fa-heart"></i> Yêu thích
                    </button>
                    <button class="share-btn" id="shareBtn" style="padding: 10px 20px; border-radius: 8px; border: 1px solid #ddd; background: white; cursor: pointer;">
                        <i class="fas fa-share-alt"></i> Chia sẻ
                    </button>
                </div>
            `;

            // Tab switching
            const tabs = document.querySelectorAll('.tab');
            const descContent = document.getElementById('descContent');
            const menuContent = document.getElementById('menuContent');
            const utilitiesContent = document.getElementById('utilitiesContent');

            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const tabId = tab.getAttribute('data-tab');
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');

                    [descContent, menuContent, utilitiesContent].forEach(content => {
                        content.classList.remove('active');
                    });

                    if (tabId === 'desc') descContent.classList.add('active');
                    if (tabId === 'menu') menuContent.classList.add('active');
                    if (tabId === 'utilities') utilitiesContent.classList.add('active');
                });
            });

            // Favorite button
            const favBtn = document.getElementById('favBtn');
            let isFav = false;

            if (favBtn) {
                favBtn.addEventListener('click', () => {
                    isFav = !isFav;
                    if (isFav) {
                        favBtn.innerHTML = '<i class="fas fa-heart"></i> Đã yêu thích';
                        favBtn.classList.add('active');
                        showToast('Đã thêm vào danh sách yêu thích!');
                    } else {
                        favBtn.innerHTML = '<i class="far fa-heart"></i> Yêu thích';
                        favBtn.classList.remove('active');
                        showToast('Đã xóa khỏi danh sách yêu thích!');
                    }
                });
            }

            // Share button
            const shareBtn = document.getElementById('shareBtn');
            if (shareBtn) {
                shareBtn.addEventListener('click', () => {
                    if (navigator.share) {
                        navigator.share({
                            title: cafeData.ten,
                            text: `Khám phá quán ${cafeData.ten} tại ${cafeData.quan}`,
                            url: window.location.href
                        });
                    } else {
                        navigator.clipboard.writeText(window.location.href);
                        showToast('Đã sao chép link!');
                    }
                });
            }
        }

        renderDetail();
    </script>
</body>

</html>
