        const container = document.getElementById("listCafe");

        function hienThiDanhSach(ds) {
            container.innerHTML = ds.map(q => `
                <div class="cafe-card" onclick="chonQuan(${q.id})">
                    <div class="img-box">
                        <img src="${q.img}" alt="${q.ten}">
                        <div class="heart"><i class="fa-regular fa-heart"></i></div>
                    </div>
                    <div class="cafe-content">
                        <div class="cafe-name">${q.ten}</div>
                        <div class="cafe-rating">⭐ ${q.rating}</div>
                        <div class="cafe-quan">📍 ${q.quan}</div>
                        <div class="cafe-review">${q.review} reviews</div>
                        <div class="delivery">${q.delivery}</div>
                        <div class="tags">
                            <span>Wifi</span>
                            <span>Máy lạnh</span>
                            <span>+5</span>
                        </div>
                    </div>
                </div>
            `).join("");
        }

        // Hàm chọn quán và lưu vào localStorage để detail lấy
        function chonQuan(id) {
            const quan = danhSachQuan.find(q => q.id === id);
            if (quan) {
                localStorage.setItem("selectedCafe", JSON.stringify(quan));
                window.location.href = "../detailPage/detailPage.html";
            }
        }

        hienThiDanhSach(danhSachQuan);

        function locQuan() {
            const keyword = document.getElementById("searchInput").value.toLowerCase();
            const quan = document.getElementById("locQuan").value;

            const ketQua = danhSachQuan.filter(q => {
                return (q.ten.toLowerCase().includes(keyword)) &&
                    (quan === "all" || q.quan === quan);
            });

            hienThiDanhSach(ketQua);
        }
